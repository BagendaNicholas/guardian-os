<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardianOS - Authorization Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-grid"></div>
    <div class="glowing-orb"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="cyber-logo">
                <i class="fa-solid fa-shield-halved tech-glow"></i>
            </div>
            <h1>GUARDIAN<span class="accent-text">OS</span></h1>
            <p class="subtitle">SECURE REMOTE MANAGEMENT INTERFACE</p>
        </div>

        <form id="auth-form" class="cyber-form">
            <div class="input-group">
                <label for="email"><i class="fa-solid fa-user-shield"></i> OPERATOR EMAIL</label>
                <input type="email" id="email" required placeholder="operator@guardian.io" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password"><i class="fa-solid fa-key"></i> ACCESS KEY</label>
                <input type="password" id="password" required placeholder="••••••••••••">
            </div>

            <div id="error-message" class="error-frame hidden">
                <i class="fa-solid fa-triangle-exclamation"></i> <span id="error-text">Access Denied</span>
            </div>

            <button type="submit" id="btn-login" class="cyber-btn">
                <span class="btn-text">INITIALIZE LINK</span>
                <span class="btn-glitch"></span>
            </button>
        </form>

        <div class="auth-footer">
            <p id="toggle-auth-text">New system node? <a href="#" id="toggle-auth-link">Register Terminal</a></p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
